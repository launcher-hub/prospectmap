<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProspectMap — Carte de prospection commerciale locale</title>
  <meta name="description" content="Trouvez les commerces locaux sans site internet autour d'une adresse. Outil de prospection gratuit basé sur OpenStreetMap.">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">

  <!-- Styles de l'application -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Toggle sidebar mobile -->
  <button id="sidebar-toggle" aria-label="Ouvrir le panneau">☰</button>
  <div id="sidebar-overlay"></div>

  <div class="app-layout">

    <!-- ═══ Sidebar ═══ -->
    <aside class="sidebar" id="sidebar">

      <!-- En-tête -->
      <div class="sidebar-header">
        <h1>📍 ProspectMap</h1>
        <p>Trouvez les commerces sans site web</p>
      </div>

      <!-- Recherche + Vérifier -->
      <div class="search-section">
        <form class="search-form" id="search-form">
          <div class="search-input-wrapper">
            <input type="text" id="search-input"
                   placeholder="Entrez une adresse…"
                   autocomplete="off"
                   spellcheck="false"
                   required>
            <button type="submit" id="search-btn">🔍</button>
            <button type="button" id="clear-btn" title="Effacer">✕</button>
          </div>
          <div id="suggestions"></div>
        </form>
        <!-- Bouton vérification — toujours visible -->
        <div id="verify-section">
          <button id="verify-btn" class="verify-btn" disabled>
            🔍 Vérifier les sites web
          </button>
        </div>
        <!-- Barre de progression -->
        <div id="verification-bar" style="display:none"></div>
      </div>

      <!-- Contrôles (repliables) -->
      <details class="controls-details">
        <summary class="controls-summary">⚙️ Options de recherche</summary>
        <div class="controls-section">
          <div class="control-group">
            <label class="control-label" for="radius-select">Rayon</label>
            <select id="radius-select"></select>
          </div>
          <div class="control-group">
            <label class="control-label">Types de commerces</label>
            <div id="category-filters"></div>
          </div>
        </div>
      </details>

      <!-- Compteur + Actions -->
      <div class="sidebar-stats">
        <div id="commerce-counter">
          <span class="counter-number">—</span>
          <span class="counter-label">En attente de recherche</span>
        </div>
        <div class="actions-bar">
          <button id="copy-all-btn" title="Copier tous les commerces sans site">📋 Copier tout</button>
        </div>
        <div id="visible-count" class="visible-count-text"></div>
      </div>

      <!-- Liste des commerces -->
      <div class="commerce-list" id="commerce-list">
        <div class="empty-state">
          <span class="empty-icon">🗺️</span>
          <p>Entrez une adresse pour trouver les commerces sans site web autour de vous.</p>
        </div>
      </div>

    </aside>

    <!-- ═══ Carte ═══ -->
    <main class="map-container">
      <div id="map"></div>
      <div id="loading-spinner">
        <div class="spinner-ring"></div>
        <span>Chargement…</span>
      </div>
    </main>

  </div>

  <!-- Messages de statut (toast) -->
  <div id="status-messages"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <!-- Application (ES modules) -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
